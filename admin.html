<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KliFox AI | KliFox Admin System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #0f1115; color: #fff; font-family: 'Inter', sans-serif; }
        .admin-layout { display: flex; height: 100vh; overflow: hidden; }
        .admin-sidebar { width: 260px; background: #1a1d24; border-right: 1px solid rgba(255,255,255,0.05); padding: 20px 0; }
        .admin-sidebar .brand { padding: 0 20px 30px; font-size: 20px; font-weight: bold; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .admin-sidebar ul { list-style: none; padding: 0; margin: 20px 0; }
        .admin-sidebar li { padding: 15px 20px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 15px; border-left: 3px solid transparent; }
        .admin-sidebar li:hover { background: rgba(255,255,255,0.02); color: #fff; }
        .admin-sidebar li.active { border-left-color: var(--accent); color: #fff; background: rgba(255,255,255,0.02); }
        
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; background: #0f1115; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1d24; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
        .stat-card h4 { margin: 0 0 10px; color: #aaa; font-weight: normal; font-size: 13px; }
        .stat-card .val { font-size: 24px; font-weight: 600; color: #fff; }
        .stat-card .val.green { color: #10b981; }
        .stat-card .val.blue { color: #3b82f6; }
        .stat-card .val.red { color: #ef4444; }

        .data-table { width: 100%; border-collapse: collapse; background: #1a1d24; border-radius: 12px; overflow: hidden; }
        .data-table th, .data-table td { padding: 15px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-table th { background: rgba(0,0,0,0.2); color: #aaa; font-weight: normal; font-size: 13px; }
        .data-table tr:hover { background: rgba(255,255,255,0.02); }

        .status-badge { padding: 5px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .status-badge.DISPATCHING { background: rgba(59,130,246,0.1); color: #3b82f6; }
        .status-badge.PARTNER_ESCALATED { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .status-badge.MATCHED { background: rgba(16,185,129,0.1); color: #10b981; }
        .status-badge.APPROVED { background: rgba(16,185,129,0.1); color: #10b981; }
        .status-badge.IN_PROGRESS { background: rgba(245,158,11,0.1); color: #f59e0b; }
        .status-badge.COMPLETED { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.CANCELLED { background: rgba(239,68,68,0.1); color: #ef4444; }

        #login-overlay { position: fixed; inset: 0; background: #0f1115; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #login-box { background: #1a1d24; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 40px; width: 300px; text-align: center; }
        #login-box input { width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; box-sizing: border-box; }
        #login-box button { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    
    <div id="login-overlay">
        <div id="login-box">
            <h2 style="margin-top:0;"><i class="fas fa-lock text-accent"></i> KliFox Admin</h2>
            <p style="color:#aaa; font-size:13px;">Erişim için şifre giriniz.</p>
            <input type="password" id="admin-pass" placeholder="Şifre" onkeypress="if(event.key==='Enter') window.Admin.login()">
            <button onclick="window.Admin.login()">Giriş Yap</button>
        </div>
    </div>

    <div class="admin-layout" style="display:none;" id="admin-dashboard">
        <div class="admin-sidebar">
            <div class="brand"><i class="fas fa-snowflake"></i> KliFox AI Admin</div>
            <ul>
                <li class="active" onclick="window.Admin.showTab('live')"><i class="fas fa-satellite-dish"></i> Canlı Operasyonlar</li>
                <li onclick="window.Admin.showTab('pending')"><i class="fas fa-user-clock"></i> Onay Bekleyenler</li>
                <li onclick="window.Admin.showTab('finance')"><i class="fas fa-chart-pie"></i> Finans & Komisyon</li>
                <li onclick="window.Admin.showTab('cancelled')"><i class="fas fa-ban"></i> İptal Edilenler</li>
            </ul>
        </div>
        <div class="admin-main">
            <div class="admin-header">
                <h2><i id="tab-icon" class="fas fa-satellite-dish"></i> <span id="tab-title">Canlı Operasyonlar</span></h2>
                <div>
                    <button class="btn-demo" style="padding: 10px 20px;" onclick="window.Admin.refreshData()"><i class="fas fa-sync"></i> Yenile</button>
                </div>
            </div>
            
            <div id="tab-content">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="ui/admin.js?v=3"></script>
</body>
</html>
